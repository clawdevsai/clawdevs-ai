# k8s/devops/cronjob-auto-update.yaml
# CronJob K8s para auto-atualização do ambiente em sessão ISOLADA.
# Executa scripts/auto-update.sh semanalmente (domingo 03:00) sem afetar a fila principal.
# Referência: docs/issues/092-auto-atualizacao-ambiente.md | docs/21-auto-atualizacao-ambiente.md
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: auto-update-environment
  namespace: ai-agents
  labels:
    app: devops-tools
    project: clawdevs
    component: maintenance
  annotations:
    description: "Auto-atualização semanal do OpenClaw e skills instaladas. Sessão isolada."
spec:
  # Todo domingo às 03:00 (horário do cluster)
  schedule: "0 3 * * 0"
  # Manter último job bem-sucedido para auditoria
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  # Não iniciar novo job se o anterior ainda estiver rodando
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # Timeout de 30 minutos para o job completo
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: auto-updater
            project: clawdevs
        spec:
          # Sessão isolada: CPU only, sem GPU, sem interferir na fila principal
          nodeSelector:
            workload-type: cpu
          serviceAccountName: agent-devops-sa
          restartPolicy: OnFailure
          containers:
            - name: auto-updater
              image: clawdevs/agent-devops:latest
              command: ["/bin/bash", "/app/scripts/auto-update.sh"]
              env:
                - name: AUTO_UPDATE_DRY_RUN
                  value: "0"
                - name: TELEGRAM_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: clawdevs-secrets
                      key: telegram-token
                - name: TELEGRAM_CHAT_ID
                  valueFrom:
                    secretKeyRef:
                      name: clawdevs-secrets
                      key: telegram-chat-id
                - name: REDIS_HOST
                  value: "redis-service"
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              volumeMounts:
                - name: skills-volume
                  mountPath: /app/skills
                - name: scripts-volume
                  mountPath: /app/scripts
          volumes:
            - name: skills-volume
              persistentVolumeClaim:
                claimName: skills-pvc
            - name: scripts-volume
              configMap:
                name: devops-scripts
---
# CronJob de curadoria de learnings (semanal, terça às 04:00)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: knowledge-curation
  namespace: ai-agents
  labels:
    app: devops-tools
    project: clawdevs
    component: maintenance
  annotations:
    description: "Curadoria centralizada de learnings dos agentes. Sessão isolada."
spec:
  schedule: "0 4 * * 2"   # Terça-feira às 04:00
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900   # 15 minutos
      template:
        metadata:
          labels:
            app: knowledge-curator
            project: clawdevs
        spec:
          nodeSelector:
            workload-type: cpu
          serviceAccountName: agent-readonly-sa
          restartPolicy: OnFailure
          containers:
            - name: curator
              image: clawdevs/agent-base:latest
              command:
                - python
                - -c
                - |
                  from memory.hot.elite_memory import WarmStore, ColdStore, KnowledgeCurator
                  warm = WarmStore()
                  cold = ColdStore()
                  curator = KnowledgeCurator(cold=cold, warm=warm)
                  result = curator.run_curation()
                  print(f"Curadoria concluída: {result}")
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              volumeMounts:
                - name: memory-store
                  mountPath: /app/memory
          volumes:
            - name: memory-store
              persistentVolumeClaim:
                claimName: shared-memory-pvc
