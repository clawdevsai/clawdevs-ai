apiVersion: v1
kind: ConfigMap
metadata:
  name: init-memory-scripts
  namespace: ai-agents
  labels:
    component: init-memory
data:
  init-memory.sh: |
    #!/bin/bash
    set -e

    AGENTS="ceo po architect developer qa devops cybersec ux dba"
    BASE="/workspace"

    echo "=== ClawDevs: Inicializando estrutura de memoria por agente ==="

    for AGENT in $AGENTS; do
      MEMORY_DIR="$BASE/$AGENT/memory"
      mkdir -p "$MEMORY_DIR/journal"
      echo "-> $AGENT"

      [ ! -f "$MEMORY_DIR/decisions.md" ] && \
        printf "# Decisions -- %s\nDecisoes tomadas com data, contexto e motivo.\n" "$AGENT" \
        > "$MEMORY_DIR/decisions.md" && echo "  v decisions.md" || echo "  - decisions.md ja existe"

      [ ! -f "$MEMORY_DIR/projects.md" ] && \
        printf "# Projects -- %s\nFeatures, sprints e tarefas ativas.\n" "$AGENT" \
        > "$MEMORY_DIR/projects.md" && echo "  v projects.md" || echo "  - projects.md ja existe"

      [ ! -f "$MEMORY_DIR/lessons.md" ] && \
        printf "# Lessons Learned -- %s\nAprendizados e erros identificados.\n" "$AGENT" \
        > "$MEMORY_DIR/lessons.md" && echo "  v lessons.md" || echo "  - lessons.md ja existe"

      [ ! -f "$MEMORY_DIR/pending.md" ] && \
        printf "# Pending -- %s\nItens aguardando input humano ou de outro agente.\n" "$AGENT" \
        > "$MEMORY_DIR/pending.md" && echo "  v pending.md" || echo "  - pending.md ja existe"
    done

    echo ""
    echo "=== Inicializando shared memory /workspace/shared/memory/ ==="

    SHARED="$BASE/shared/memory"
    mkdir -p "$SHARED"

    [ ! -f "$SHARED/strategy.md" ] && \
      printf "# Strategy -- ClawDevs AI (Shared)\nDiretrizes estrategicas ativas. Mantido pelo CEO.\n" \
      > "$SHARED/strategy.md" && echo "  v strategy.md" || echo "  - strategy.md ja existe"

    [ ! -f "$SHARED/architecture.md" ] && \
      printf "# Architecture Decisions -- ClawDevs AI (Shared)\nDecisoes de arquitetura. Mantido pelo Architect.\n" \
      > "$SHARED/architecture.md" && echo "  v architecture.md" || echo "  - architecture.md ja existe"

    [ ! -f "$SHARED/backlog.md" ] && \
      printf "# Backlog State -- ClawDevs AI (Shared)\nEstado do backlog. Mantido pelo PO.\n" \
      > "$SHARED/backlog.md" && echo "  v backlog.md" || echo "  - backlog.md ja existe"

    [ ! -f "$SHARED/incidents.md" ] && \
      printf "# Incidents e Postmortems -- ClawDevs AI (Shared)\nMantido por CyberSec e DevOps.\n" \
      > "$SHARED/incidents.md" && echo "  v incidents.md" || echo "  - incidents.md ja existe"

    echo ""
    echo "=== Inicializacao concluida ==="
