# k8s/agents/devops/deployment.yaml
# Deployment do Agente DevOps/SRE.
# Referência: docs/issues/013-pods-tecnicos-developer-opencode.md | docs/02-agentes.md
#
# Hardware: CPU only (Phi-3 Mini) — não consome GPU
# Permissões: agent-devops-sa (admin para repos e infra)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-devops
  namespace: ai-agents
  labels:
    app: agent-devops
    agent-type: cpu
    project: clawdevs
  annotations:
    description: "DevOps/SRE: IaC, CI/CD, repos, FinOps, monitoramento 65%. Zero binários em skills. CPU only."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-devops
  template:
    metadata:
      labels:
        app: agent-devops
        project: clawdevs
        agent-type: cpu
    spec:
      # DevOps roda EXCLUSIVAMENTE em CPU (Phi-3 Mini) — não consome GPU
      nodeSelector:
        workload-type: cpu-only
      serviceAccountName: agent-devops-sa  # Permissões admin para repos e infra
      containers:
        - name: agent-devops
          image: clawdevs/agent-devops:latest
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "DevOps"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "task:infra"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-devops"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "phi3:mini"    # Modelo leve em CPU
            # Monitoramento de temperatura (checkpoint 80°C)
            - name: TEMP_CHECKPOINT_THRESHOLD
              value: "80"
            - name: TEMP_EMERGENCY_THRESHOLD
              value: "82"
            # Heartbeat para detecção de cluster acéfalo
            - name: HEARTBEAT_CEO_TIMEOUT_SECONDS
              value: "300"   # 5 min sem comando estratégico do CEO → contingência
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
