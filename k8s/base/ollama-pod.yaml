# Pod standalone: para alterar resources, delete o Pod e reaplique (kubectl delete pod ollama && kubectl apply -k k8s).
apiVersion: v1
kind: Pod
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  restartPolicy: Always
  containers:
    - name: ollama
      image: ollama/ollama:latest
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 2Gi
      volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -euo pipefail
          ollama serve &
          for i in $(seq 1 60); do
            if ollama list >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          if [ "${OLLAMA_AUTO_PULL_MODELS:-false}" = "true" ]; then
            for model in ${OLLAMA_BOOT_MODELS:-}; do
              ollama pull "${model}" || echo "Aviso: pull do modelo ${model} falhou."
            done
          else
            echo "OLLAMA_AUTO_PULL_MODELS=false: iniciando sem pulls automáticos para reduzir bootstrap."
          fi
          wait
      ports:
        - containerPort: 11434
      env:
        - name: OLLAMA_HOST
          value: 0.0.0.0:11434
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: ollama-auth
              key: OLLAMA_API_KEY
        - name: OLLAMA_AUTO_PULL_MODELS
          value: "false"
        - name: OLLAMA_BOOT_MODELS
          value: ""
  volumes:
    - name: ollama-data
      persistentVolumeClaim:
        claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
