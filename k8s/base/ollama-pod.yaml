apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ollama
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ollama
          image: clawdevsai/ollama-runtime:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ollama-auth
                  key: OLLAMA_API_KEY
            # Espelha models.providers.ollama.models em bootstrap-scripts/09-openclaw-config.sh (ids).
            # start-ollama.sh (docker/ollama-runtime) faz ollama pull para cada token (espaco).
            - name: OLLAMA_AUTO_PULL_MODELS
              value: "true"
            - name: OLLAMA_BOOT_MODELS
              value: "qwen3-next:80b-cloud gpt-oss:120b-cloud nemotron-3-super:cloud qwen3-coder:480b-cloud gemma3:27b-cloud qwen3-vl:235b-cloud qwen3.5:397b-cloud minimax-m2.7:cloud qwen3-coder-next:cloud nomic-embed-text"
          startupProbe:
            httpGet:
              path: /api/tags
              port: 11434
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
