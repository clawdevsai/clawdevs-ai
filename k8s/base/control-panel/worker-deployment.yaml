apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawdevs-panel-worker
  labels:
    app: clawdevs-panel-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawdevs-panel-worker
  template:
    metadata:
      labels:
        app: clawdevs-panel-worker
    spec:
      serviceAccountName: clawdevs-panel
      initContainers:
        - name: wait-for-deps
          image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            - sh
            - -c
            - |
              echo "Waiting for clawdevs-panel-db:5432..."
              until nc -z clawdevs-panel-db 5432 2>/dev/null; do
                sleep 2
              done
              echo "DB is ready!"
              echo "Waiting for clawdevs-panel-redis:6379..."
              until nc -z clawdevs-panel-redis 6379 2>/dev/null; do
                sleep 2
              done
              echo "Redis is ready!"
      containers:
        - name: worker
          image: clawdevsai/clawdevs-panel-backend@sha256:2264c5e77f50b7307d11184939db56acd967b380649014ac21c8445a1199a819
          imagePullPolicy: IfNotPresent
          command: ["python", "-m"]
          args:
            - scripts.worker
          # envFrom first so individual env vars can override
          envFrom:
            - secretRef:
                name: clawdevs-panel-auth
            - secretRef:
                name: openclaw-auth
          env:
            - name: PANEL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clawdevs-panel-auth
                  key: PANEL_DB_PASSWORD
            - name: PANEL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clawdevs-panel-auth
                  key: PANEL_REDIS_PASSWORD
            - name: PANEL_DATABASE_URL
              value: "postgresql+asyncpg://panel:$(PANEL_DB_PASSWORD)@clawdevs-panel-db:5432/clawdevs_panel"
            - name: PANEL_REDIS_URL
              value: "redis://:$(PANEL_REDIS_PASSWORD)@clawdevs-panel-redis:6379/0"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "rq info --url redis://:${PANEL_REDIS_PASSWORD}@clawdevs-panel-redis:6379/0 2>/dev/null || true"
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: openclaw-data
              mountPath: /data/openclaw
              readOnly: true
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
