apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawdevs-panel-backend
  labels:
    app: clawdevs-panel-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: clawdevs-panel-backend
  template:
    metadata:
      labels:
        app: clawdevs-panel-backend
    spec:
      serviceAccountName: clawdevs-panel
      initContainers:
        - name: wait-for-postgres
          image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at clawdevs-panel-db:5432..."
              until nc -z clawdevs-panel-db 5432; do
                echo "PostgreSQL not ready yet, sleeping..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          volumeMounts:
            - name: openclaw-data
              mountPath: /data/openclaw
        - name: wait-for-redis
          image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis at clawdevs-panel-redis:6379..."
              until nc -z clawdevs-panel-redis 6379 2>/dev/null; do
                sleep 2
              done
              echo "Redis is ready!"
        - name: fix-permissions
          image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              echo "Fixing permissions on /data/openclaw..."
              chmod -R 755 /data/openclaw
              chown -R 1000:1000 /data/openclaw
              # Ensure openclaw.json is readable if it exists
              if [ -f /data/openclaw/openclaw.json ]; then
                chmod 644 /data/openclaw/openclaw.json
                chown 1000:1000 /data/openclaw/openclaw.json
                echo "Fixed openclaw.json permissions"
              fi
              echo "Permissions fixed!"
          volumeMounts:
            - name: openclaw-data
              mountPath: /data/openclaw
      containers:
        - name: backend
          image: clawdevsai/clawdevs-panel-backend@sha256:2264c5e77f50b7307d11184939db56acd967b380649014ac21c8445a1199a819
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000
          ports:
            - name: http
              containerPort: 8000
          # envFrom first so individual env vars can override if needed
          envFrom:
            - secretRef:
                name: clawdevs-panel-auth
            - secretRef:
                name: openclaw-auth
          env:
            - name: PANEL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clawdevs-panel-auth
                  key: PANEL_DB_PASSWORD
            - name: PANEL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clawdevs-panel-auth
                  key: PANEL_REDIS_PASSWORD
            - name: PANEL_DATABASE_URL
              value: "postgresql+asyncpg://panel:$(PANEL_DB_PASSWORD)@clawdevs-panel-db:5432/clawdevs_panel"
            - name: PANEL_REDIS_URL
              value: "redis://:$(PANEL_REDIS_PASSWORD)@clawdevs-panel-redis:6379/0"
            - name: PANEL_OPENCLAW_GATEWAY_URL
              value: "http://clawdevs-ai:18789"
          resources:
            requests:
              cpu: 750m
              memory: 1024Mi
            limits:
              cpu: 750m
              memory: 1024Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: openclaw-data
              mountPath: /data/openclaw
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
