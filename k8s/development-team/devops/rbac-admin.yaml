# RBAC Administrativo para o Agente DevOps (Sérgio Master)
# Ref: implementation_plan.md (Fase 2)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-admin-sa
  namespace: ai-agents
  labels:
    app: devops-worker
    team: development
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-admin-role
  namespace: ai-agents
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-admin-rb
  namespace: ai-agents
subjects:
- kind: ServiceAccount
  name: devops-admin-sa
  namespace: ai-agents
roleRef:
  kind: Role
  name: devops-admin-role
  apiGroup: rbac.authorization.k8s.io
