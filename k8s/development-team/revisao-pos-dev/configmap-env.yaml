# Variáveis de ambiente para o slot Revisão pós-Dev (007/125 + Fase 3).
# Stream, consumer group, Redis; Architect real via Ollama quando OLLAMA_BASE_URL definido.
apiVersion: v1
kind: ConfigMap
metadata:
  name: revisao-pos-dev-env
  namespace: ai-agents
  labels:
    app: revisao-pos-dev
data:
  STREAM_CODE_READY: "code:ready"
  CONSUMER_GROUP_REVISAO: "revisao-pos-dev"
  SLOT_REVISAO_TIMEOUT_SEC: "300"
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
  # Architect via Ollama (Fase 3 — 032). Vazio = stub (aprova sempre).
  OLLAMA_BASE_URL: "http://ollama-service.ai-agents.svc.cluster.local:11434"
  ARCHITECT_MODEL: "glm-5:cloud"
  ARCHITECT_TIMEOUT_SEC: "120"
  KEY_PREFIX_PROJECT: "project:v1"
