name: Validate Deployment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate k8s/.env from secrets
        run: |
          cat > k8s/.env <<ENVEOF
          OPENCLAW_GATEWAY_TOKEN=${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          TELEGRAM_BOT_TOKEN_CEO=${{ secrets.TELEGRAM_BOT_TOKEN_CEO }}
          TELEGRAM_CHAT_ID_CEO=${{ secrets.TELEGRAM_CHAT_ID_CEO }}
          GIT_TOKEN=${{ secrets.GIT_TOKEN }}
          GIT_ORG=${{ secrets.GIT_ORG }}
          GIT_DEFAULT_REPOSITORY=${{ secrets.GIT_DEFAULT_REPOSITORY }}
          DIRECTORS_NAME=${{ secrets.DIRECTORS_NAME }}
          OLLAMA_API_KEY=${{ secrets.OLLAMA_API_KEY }}
          PROVEDOR_LLM=ollama
          OPENCLAW_LOG_LEVEL=info
          DEBUG_LOG_ENABLED=false
          PUSH_IMAGE=remote
          PANEL_SECRET_KEY=${{ secrets.PANEL_SECRET_KEY }}
          PANEL_ADMIN_USERNAME=admin
          PANEL_ADMIN_PASSWORD=${{ secrets.PANEL_ADMIN_PASSWORD }}
          PANEL_DB_PASSWORD=${{ secrets.PANEL_DB_PASSWORD }}
          PANEL_REDIS_PASSWORD=${{ secrets.PANEL_REDIS_PASSWORD }}
          SEARXNG_SECRET=${{ secrets.SEARXNG_SECRET }}
          ENVEOF

      - name: Validate Kustomize manifests
        run: kubectl kustomize k8s

      - name: Check for secrets
        run: |
          echo "Checking for hardcoded secrets..."
          grep -r "password\|secret\|token" k8s/overlays/ || true
          grep -r "api_key\|apikey" k8s/overlays/ || true

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Python tests
        run: |
          cd control-panel/backend
          python -m pytest --tb=short -q || true

      - name: Run frontend tests
        run: |
          cd control-panel/frontend
          npm install --legacy-peer-deps
          npm run lint || true

  integration-tests:
    runs-on: ubuntu-latest
    env:
      HAS_KUBECONFIG: ${{ secrets.KUBECONFIG != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        if: env.HAS_KUBECONFIG == 'true'
        uses: azure/k8s-set-context@v1
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Wait for pods to be ready
        if: env.HAS_KUBECONFIG == 'true'
        run: |
          kubectl wait --for=condition=Ready pod/ollama --timeout=300s || true
          kubectl wait --for=condition=Ready pod/clawdevs-ai-0 --timeout=300s || true

      - name: Test OpenClaw connectivity
        if: env.HAS_KUBECONFIG == 'true'
        run: |
          kubectl port-forward svc/ollama 11434:11434 &
          sleep 5
          curl -s http://localhost:11434/api/tags || echo "Ollama not responding"
          pkill -f "port-forward"

      - name: Skip integration tests when kubeconfig is not configured
        if: env.HAS_KUBECONFIG != 'true'
        run: |
          echo "KUBECONFIG secret is not configured. Skipping integration tests."
          echo "## Integration Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skipped because \`KUBECONFIG\` secret is not configured." >> "$GITHUB_STEP_SUMMARY"

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload results to GitHub Security
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
